spring.application.name=humor_project
server.port=8082

# Weekly refresh (every Monday 00:00 Asia/Seoul)
meme.refresh.cron=0 0 0 * * MON

# Optional YouTube Data API v3 key. Leave blank to use Reddit-only aggregation.
meme.youtube.api-key=
meme.youtube.region-code=KR

# Optional X API bearer token.
meme.x.bearer-token=

spring.datasource.url=jdbc:mariadb://192.168.56.200:3306/memedb
spring.datasource.username=webuser
spring.datasource.password=0000
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true