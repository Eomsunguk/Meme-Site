spring.application.name=humor_project
server.port=8083

# Weekly refresh (every Monday 00:00 Asia/Seoul)
meme.refresh.cron=0 0 0 * * MON

# Optional YouTube Data API v3 key. Leave blank to use Reddit-only aggregation.
meme.youtube.api-key=
meme.youtube.region-code=KR

# Optional X API bearer token.
meme.x.bearer-token=

spring.datasource.url=jdbc:h2:mem:memedb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.flyway.enabled=false

meme.catalog.warm-up-enabled=true
